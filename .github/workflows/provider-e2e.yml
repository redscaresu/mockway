name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugin-cache-${{ runner.os }}-v1

      - name: Download Go modules
        run: go mod download

      - name: Run default tests
        run: go test ./... -v

      - name: Run provider E2E smoke test
        run: |
          set -euo pipefail
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "Provider E2E attempt $i/$attempts"
            if go test -tags provider_e2e ./e2e -v 2>&1 | tee provider-e2e.log; then
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              sleep 10
            fi
          done
          exit 1

      - name: Upload provider E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: provider-e2e-log
          path: provider-e2e.log

  tag:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            latest="v0.1.0"
            git tag "$latest"
            git push origin "$latest"
            exit 0
          fi

          major=$(echo "$latest" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$latest" | cut -d. -f2)
          patch=$(echo "$latest" | cut -d. -f3)
          next="v${major}.${minor}.$((patch + 1))"

          echo "Latest tag: $latest → Next tag: $next"
          git tag "$next"
          git push origin "$next"
